# ImageNet-A (Adversarial) 测试配置文件
# 用于领域泛化实验 - 测试对对抗样本和困难样本的鲁棒性

# === 基础模型配置 ===
model_size: ViT-B/16       # CLIP模型大小
dataset: imagenet-a        # 数据集名称
data_path: /path/to/project/DATA/imagenet-a    # 修改为你的ImageNet-A数据集路径

# === STN核心配置 ===
stn_config:
  # 网络架构参数（与ImageNet训练配置保持一致）
  hidden_dim: 256          # 注意力和MLP的隐藏维度
  num_heads: 8             # 多头注意力的头数
  dropout: 0.1             # Dropout概率
  patch_layer: -2          # 提取patch特征的ViT层
  num_views: 4             # 多视角STN的视角数量
  fusion_mode: transformer # 特征融合模式
  
  # Transformer融合配置
  transformer_heads: 8      # Transformer注意力头数
  transformer_layers: 2     # Transformer编码器层数
  transformer_dropout: 0.1  # Transformer的Dropout概率

  # 多视角STN损失配置（测试时不使用，但需要保持一致以加载模型）
  classification_weight: 1.0
  contrastive_weight: 0.0
  decorrelation_weight: 0.5
  adaptive_weight: 0.7
  logits_temp: 0.07

# === 训练配置（测试时不使用，但保留以保持配置完整性）===
training:
  epochs: 100
  batch_size: 48
  num_workers: 10
  
  optimizer: adamw
  learning_rate: 3e-4
  weight_decay: 1e-2
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8
  mixed_precision: false
  
  patience: 10
  eta_min: 1e-6
  warmup_epochs: 8
  warmup_factor: 0.05
  max_grad_norm: 1.0
  grad_norm_type: 2.0

# 数据集结构说明：
# /path/to/imagenet-a/
#   └── test/
#       ├── n01440764/  (类别文件夹)
#       │   ├── hard_image1.jpg
#       │   └── adversarial_image2.jpg
#       ├── n01443537/
#       └── ...

# 数据集特点：
# - 包含对抗性样本和困难样本
# - 200个ImageNet类别的子集
# - 约7,500张图像
# - 这些样本对标准模型来说特别困难

# 测试命令：
# python test_multi_stn.py --dataset_name imagenet-a --batch_size 32
# 也可以使用别名: imageneta
# 注意：这个数据集通常准确率会显著下降，这是正常现象
